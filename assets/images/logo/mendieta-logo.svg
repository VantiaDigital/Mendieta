<?xml version="1.0" encoding="UTF-8"?>
<!--
  Logo Mendieta — recreación SVG aproximada del avatar oficial.
  Personaje: Mendieta (el perro de Inodoro Pereyra, de Fontanarrosa)
  con gorro de cocinero, sentado.
  Es una INTERPRETACIÓN del logo original mientras llega el archivo oficial.
  Reemplazar este archivo por el SVG/PNG real cuando se reciba.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Mendieta">
  <!-- Fondo circular crema -->
  <circle cx="128" cy="128" r="124" fill="#FAF6CA" stroke="#EBE0A8" stroke-width="2"/>

  <!-- Mendieta (perro chef) — línea oliva oscura -->
  <g fill="none" stroke="#2A2818" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">

    <!-- ===== Gorro de chef ===== -->
    <!-- Banda inferior del gorro -->
    <path d="M104 68 L 152 68" stroke-width="2.4" />
    <!-- Forma abultada del gorro (tres lobulitos) -->
    <path d="M104 68
             C 100 60, 98 50, 104 46
             C 100 40, 106 32, 116 36
             C 116 28, 128 26, 132 34
             C 138 30, 148 34, 146 44
             C 152 46, 154 56, 150 64
             C 154 64, 156 68, 152 68 Z" />

    <!-- ===== Cabeza del perro ===== -->
    <!-- Cráneo redondo -->
    <path d="M108 70
             C 96 78, 92 92, 96 104
             C 99 116, 110 122, 122 122
             C 135 122, 148 116, 152 104
             C 156 92, 152 78, 148 72" />

    <!-- Oreja izquierda (caída) -->
    <path d="M100 86
             C 90 92, 84 104, 86 114
             C 90 116, 96 112, 100 106
             C 102 100, 102 92, 100 86 Z" />

    <!-- Oreja derecha (caída) -->
    <path d="M156 86
             C 166 92, 172 104, 170 114
             C 166 116, 160 112, 156 106
             C 154 100, 154 92, 156 86 Z" />

    <!-- Línea horizontal de los ojos/anteojos (rasgo del personaje) -->
    <path d="M110 98 L 146 98" stroke-width="2" />

    <!-- Hocico / nariz (curva al frente) -->
    <path d="M118 108 q 10 6 20 0" stroke-width="2" />
    <circle cx="128" cy="112" r="1.8" fill="#2A2818" stroke="none" />

    <!-- ===== Cuerpo del perro sentado ===== -->
    <!-- Cuello/pecho -->
    <path d="M118 122 C 118 132, 116 140, 116 150" />
    <path d="M138 122 C 138 132, 140 140, 140 150" />

    <!-- Patas delanteras erguidas -->
    <path d="M116 150 C 114 168, 114 184, 118 198" />
    <path d="M140 150 C 142 168, 142 184, 138 198" />
    <!-- Patitas / dedos -->
    <path d="M114 198 q 6 4 12 0" stroke-width="2" />
    <path d="M134 198 q 6 4 12 0" stroke-width="2" />

    <!-- Caderas / piernas traseras (sentado, en forma de paréntesis) -->
    <path d="M116 152
             C 96 156, 88 172, 90 198
             C 92 208, 100 212, 110 210" />
    <path d="M140 152
             C 160 156, 168 172, 166 198
             C 164 208, 156 212, 146 210" />

    <!-- Línea base / suelo (curva suave bajo el perro) -->
    <path d="M86 212 q 42 8 84 0" stroke-width="2" />

    <!-- Colita pequeña detrás (apenas asoma) -->
    <path d="M162 168 q 6 -4 8 -10" stroke-width="2" />
  </g>
</svg>
